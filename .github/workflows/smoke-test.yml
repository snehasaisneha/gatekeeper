name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: test-secret-key-minimum-32-characters
      DATABASE_URL: sqlite+aiosqlite:///./test.db
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_RP_NAME: Test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen

      - name: Verify CLI loads
        run: uv run gk --help

      - name: Verify CLI subcommands
        run: |
          uv run gk users --help
          uv run gk apps --help
          uv run gk ops --help

      - name: Start server and check health
        run: |
          uv run gk ops serve &
          SERVER_PID=$!
          sleep 5

          # Check if server is responding
          curl --fail --silent --show-error http://127.0.0.1:8000/health || exit 1

          # Cleanup
          kill $SERVER_PID

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
